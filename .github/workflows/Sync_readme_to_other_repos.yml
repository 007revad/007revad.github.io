# Sync https://github.com/007revad/007revad.github.io README.md to other repos' my-other-scripts.md

name: Sync README to other repos

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Sync to other repos
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          CONTENT=$(base64 -w 0 README.md)

          echo "Finding repos with my-other-scripts.md..."
          REPOS=$(gh search code \
            --owner 007revad \
            "filename:my-other-scripts.md" \
            --json repository \
            --jq '.[].repository.nameWithOwner')

          echo "Found repos:"
          echo "$REPOS"

          while IFS= read -r REPO; do
            # Skip the source repo itself
            if [ "$REPO" = "007revad/007revad.github.io" ]; then
              continue
            fi

            echo "Syncing to $REPO..."

            SHA=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/contents/my-other-scripts.md" \
              | jq -r '.sha // empty')

            if [ -n "$SHA" ]; then
              echo "  Updating existing file (sha: $SHA)"
              jq -n \
                --arg msg "Sync my-other-scripts.md from 007revad.github.io" \
                --arg content "$CONTENT" \
                --arg sha "$SHA" \
                '{message: $msg, content: $content, sha: $sha}' > /tmp/payload.json
            else
              echo "  Creating new file"
              jq -n \
                --arg msg "Add my-other-scripts.md synced from 007revad.github.io" \
                --arg content "$CONTENT" \
                '{message: $msg, content: $content}' > /tmp/payload.json
            fi

            RESULT=$(curl -s -w "\n%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO/contents/my-other-scripts.md" \
              -d @/tmp/payload.json)

            HTTP_CODE=$(echo "$RESULT" | tail -1)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "✓ Done: $REPO"
            else
              echo "✗ Failed: $REPO (HTTP $HTTP_CODE)"
              echo "$RESULT" | head -1
            fi

          done <<< "$REPOS"
