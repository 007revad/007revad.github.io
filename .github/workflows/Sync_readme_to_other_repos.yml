# Sync https://github.com/007revad/007revad.github.io README.md to other repos' my-other-scripts.md

name: Sync README to other repos

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_dispatch:  # allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Sync to other repos
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          CONTENT=$(base64 -w 0 README.md)
          
          REPOS=(
            "007revad/Asustor_Ookla_Speedtest"
            "007revad/Asustor_Open_Speedtest"
            "007revad/Asustor_Plex_Backup"
            "007revad/Asustor_SMART_info"
            "007revad/ContainerManager_for_all_armv8"
            "007revad/Docker_Autocompose"
            "007revad/DTC_GUI_for_Windows"
            "007revad/Linux_Plex_Backup"
            "007revad/my_repos"
            "007revad/Plex_Server_Sync"
            "007revad/Restore_RS3621_Fan_Speed"
            "007revad/ScriptNotify"
            "007revad/Seagate_lowCurrentSpinup"
            "007revad/SS_Motion_Detection"
            "007revad/Syno_DSM_Extractor_GUI"
            "007revad/Syno_enable_nail_polish"
            "007revad/Synoboot_backup"
            "007revad/Synology_app_mover"
            "007revad/Synology_Cleanup_Coredumps"
            "007revad/Synology_clear_drive_error"
            "007revad/Synology_Config_Backup"
            "007revad/Synology_ContainerManager_IPv6"
            "007revad/Synology_CPU_temperature"
            "007revad/Synology_created_date"
            "007revad/Synology_docker_cleanup"
            "007revad/Synology_Docker_Export"
            "007revad/Synology_Download_Station_Chrome_Extension"
            "007revad/Synology_DSM_reinstall"
            "007revad/Synology_DSM_Telnet_Password"
            "007revad/Synology_enable_Deduplication"
            "007revad/Synology_enable_eunit"
            "007revad/Synology_enable_M2_card"
            "007revad/Synology_enable_M2_volume"
            "007revad/Synology_enable_sequential_IO"
            "007revad/Synology_HDD_db"
            "007revad/Synology_Information_Wiki"
            "007revad/Synology_M2_volume"
            "007revad/Synology_Ookla_Speedtest"
            "007revad/Synology_Open_Speedtest\my-other-scripts.md
            "007revad/Synology_package_updater"
            "007revad/Synology_Plex_Backup"
            "007revad/Synology_Recover_Data"
            "007revad/Synology_SHR_switch"
            "007revad/Synology_SMART_info"
            "007revad/Synology_toggle_reset_button"
            "007revad/template"
            "007revad/Transcode_for_x25"
            "007revad/Video_Station_for_DSM_722"
          )
          
          for REPO in "${REPOS[@]}"; do
            echo "Syncing to $REPO..."
            
            # Get the current file's SHA (needed for update), if it exists
            SHA=$(gh api \
              "repos/$REPO/contents/my-other-scripts.md" \
              --jq '.sha' 2>/dev/null || echo "")
            
            if [ -n "$SHA" ]; then
              # Update existing file
              gh api \
                --method PUT \
                "repos/$REPO/contents/my-other-scripts.md" \
                --field message="Sync my-other-scripts.md from 007revad.github.io" \
                --field content="$CONTENT" \
                --field sha="$SHA"
            else
              # Create new file
              gh api \
                --method PUT \
                "repos/$REPO/contents/my-other-scripts.md" \
                --field message="Add my-other-scripts.md synced from 007revad.github.io" \
                --field content="$CONTENT"
            fi
            
            echo "✓ Done: $REPO"
          done