# Sync https://github.com/007revad/007revad.github.io README.md to other repos' my-other-scripts.md

name: Sync README to other repos

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Sync to other repos
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          CONTENT=$(base64 -w 0 README.md)

          REPOS=(
            "007revad/Synospeedtest"
            "007revad/Synology_Open_Speedtest"
            "007revad/asustor_smart_info"
            "007revad/syno_smart_info"
          )

          for REPO in "${REPOS[@]}"; do
            echo "Syncing to $REPO..."

            # Get the current file's SHA if it exists
            SHA=$(gh api "repos/$REPO/contents/my-other-scripts.md" --jq '.sha' 2>/dev/null || echo "")

            # Build JSON payload in a temp file to avoid quoting issues
            if [ -n "$SHA" ]; then
              jq -n \
                --arg msg "Sync my-other-scripts.md from 007revad.github.io" \
                --arg content "$CONTENT" \
                --arg sha "$SHA" \
                '{message: $msg, content: $content, sha: $sha}' > /tmp/payload.json
            else
              jq -n \
                --arg msg "Add my-other-scripts.md synced from 007revad.github.io" \
                --arg content "$CONTENT" \
                '{message: $msg, content: $content}' > /tmp/payload.json
            fi

            gh api \
              --method PUT \
              "repos/$REPO/contents/my-other-scripts.md" \
              --input /tmp/payload.json

            echo "✓ Done: $REPO"
          done
