# Sync https://github.com/007revad/007revad.github.io README.md to my other repos' my-other-scripts.md

name: Sync README to other repos

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Sync to other repos
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          CONTENT=$(base64 -w 0 README.md)

          echo "Getting all repos for 007revad..."
          REPOS=""
          PAGE=1
          while true; do
            BATCH=$(gh api \
              "user/repos?per_page=100&type=owner&page=$PAGE" \
              --jq '.[].full_name')
            [ -z "$BATCH" ] && break
            REPOS="$REPOS"$'\n'"$BATCH"
            PAGE=$((PAGE + 1))
          done
          REPOS=$(echo "$REPOS" | sed '/^$/d')

          echo "Checking each repo for my-other-scripts.md..."

          while IFS= read -r REPO; do
            # Skip the source repo itself
            if [ "$REPO" = "007revad/007revad.github.io" ]; then
              continue
            fi

            # Check if my-other-scripts.md exists in this repo
            SHA=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/contents/my-other-scripts.md" \
              | jq -r '.sha // empty')

            # Skip repos that don't have the file
            if [ -z "$SHA" ]; then
              echo "⊘ Skipping: $REPO (no my-other-scripts.md)"
              continue
            fi

            echo "Syncing to $REPO..."
            jq -n \
              --arg msg "Sync my-other-scripts.md from 007revad.github.io" \
              --arg content "$CONTENT" \
              --arg sha "$SHA" \
              '{message: $msg, content: $content, sha: $sha}' > /tmp/payload.json

            RESULT=$(curl -s -w "\n%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO/contents/my-other-scripts.md" \
              -d @/tmp/payload.json)

            HTTP_CODE=$(echo "$RESULT" | tail -1)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "✓ Done: $REPO"
            else
              echo "✗ Failed: $REPO (HTTP $HTTP_CODE)"
              echo "$RESULT" | head -1
            fi

          done <<< "$REPOS"
