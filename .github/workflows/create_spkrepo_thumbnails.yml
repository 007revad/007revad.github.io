name: Bootstrap spkrepo thumbnails

# Run manually from the Actions tab in 007revad.github.io to populate
# all package thumbnails in one shot, without touching any package repos.
on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 007revad.github.io
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Install ImageMagick
        run: sudo apt-get install -y --no-install-recommends imagemagick

      - name: Process each package repo
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          process_repo() {
            local repo="$1"
            local pkg_json="$2"

            echo "--- Processing ${repo} ---"

            # Shallow clone into a temp dir
            local tmp
            tmp=$(mktemp -d)
            git clone --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/007revad/${repo}.git" \
              "${tmp}"

            PKG_NAME=$(jq -r '.package' "${tmp}/${pkg_json}")
            DEST="spkrepo/thumbnails/${PKG_NAME}_120.png"

            mkdir -p spkrepo/thumbnails
            /usr/bin/convert "${tmp}/synology/PACKAGE_ICON.PNG" \
              -resize 120x120 \
              -gravity center \
              -extent 120x120 \
              "${DEST}"

            rm -rf "${tmp}"

            git add "${DEST}"
            if git diff --cached --quiet; then
              echo "Thumbnail for ${PKG_NAME} unchanged — skipping."
            else
              git commit -m "chore: bootstrap spkrepo thumbnail for ${PKG_NAME} [skip ci]"
              git push
              echo "Pushed thumbnail for ${PKG_NAME}."
            fi
          }

          process_repo "Synology_Ookla_Speedtest"  "package.json"
          process_repo "Synology_Open_Speedtest"   "package.json"
          process_repo "Synology_Libre_Speedtest"  "package.json"
          process_repo "Transcode_for_x25"         "package.json"
