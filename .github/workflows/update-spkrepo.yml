name: Update spkrepo index.json

# Triggers:
#   1. Called via repository_dispatch from each package repo (on new release)
#   2. Manual run from Actions tab
#   3. Weekly Sunday at 02:00 UTC (safety net catch-up)
on:
  repository_dispatch:
    types: [spk-release]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 007revad.github.io
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Fetch latest release info and regenerate index.json
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set -euo pipefail

          # ------------------------------------------------------------------ #
          # Helper: fetch latest release for a repo, read package metadata from
          # the repo's own package.json, and emit a repository package object.
          #
          # Usage: make_entry <repo> <arch_list> <firmware>
          #   repo     : GitHub repo name under 007revad/
          #   arch     : space-separated DSM arch string
          #   firmware : minimum DSM version e.g. "7.0-0000"
          # ------------------------------------------------------------------ #
          make_entry() {
            local repo="$1"
            local arch="$2"
            local firmware="$3"

            local api_url="https://api.github.com/repos/007revad/${repo}/releases/latest"
            local release
            release=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
                           -H "Accept: application/vnd.github+json" \
                           "${api_url}")

            local tag version
            tag=$(echo "$release" | jq -r '.tag_name // empty')
            version="${tag#v}"

            # Read package metadata directly from the repo's package.json
            local pkg_json_url="https://raw.githubusercontent.com/007revad/${repo}/main/package.json"
            local pkg_json
            pkg_json=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "${pkg_json_url}")

            local pkg dname desc
            pkg=$(echo "$pkg_json"   | jq -r '.package')
            dname=$(echo "$pkg_json" | jq -r '.displayname // .package')
            desc=$(echo "$pkg_json"  | jq -r '.description // ""')

            # Locate the .spk asset by package name pattern
            local spk_url size
            spk_url=$(echo "$release" | jq -r \
              --arg pkg "${pkg}" \
              '.assets[] | select(.name | test("^" + $pkg + ".*\\.spk$"; "i")) | .browser_download_url' \
              | head -1)

            if [[ -z "$spk_url" ]]; then
              echo "WARNING: No .spk asset found for ${pkg} in ${repo} ${tag}" >&2
              spk_url="https://github.com/007revad/${repo}/releases/latest/download/${pkg}.spk"
            fi

            size=$(echo "$release" | jq -r \
              --arg pkg "${pkg}" \
              '.assets[] | select(.name | test("^" + $pkg + ".*\\.spk$"; "i")) | .size' \
              | head -1)
            size="${size:-0}"

            jq -n \
              --arg package        "${pkg}" \
              --arg version        "${version}" \
              --arg dname          "${dname}" \
              --arg desc           "${desc}" \
              --arg maintainer     "007revad" \
              --arg maintainer_url "https://github.com/007revad" \
              --arg distributor    "007revad" \
              --arg dist_url       "https://github.com/007revad/${repo}" \
              --arg support_url    "https://github.com/007revad/${repo}/issues" \
              --arg report_url     "https://github.com/007revad/${repo}/issues" \
              --arg link           "${spk_url}" \
              --arg arch           "${arch}" \
              --arg firmware       "${firmware}" \
              --arg thumbnail      "https://007revad.github.io/spkrepo/thumbnails/${pkg}_120.png" \
              --argjson size       "${size}" \
              '{
                package:          $package,
                version:          $version,
                dname:            $dname,
                desc:             $desc,
                maintainer:       $maintainer,
                maintainer_url:   $maintainer_url,
                distributor:      $distributor,
                distributor_url:  $dist_url,
                support_url:      $support_url,
                report_url:       $report_url,
                link:             $link,
                arch:             $arch,
                firmware:         $firmware,
                thumbnail:        [$thumbnail],
                snapshot:         [],
                beta:             false,
                size:             $size
              }'
          }

          # ------------------------------------------------------------------ #
          # Helper: like make_entry but for versioned SPK filenames with
          # explicit firmware bounds (Transcode_for_x25 DSM 7.2 / 7.3 builds).
          #
          # Usage: make_transcode_entry <dsm_ver> <firmware_min> <firmware_max>
          #   dsm_ver     : e.g. "7.2" or "7.3"
          #   firmware_min: e.g. "7.2-0000"
          #   firmware_max: e.g. "7.2-99999"  (empty string = no upper bound)
          # ------------------------------------------------------------------ #
          make_transcode_entry() {
            local dsm_ver="$1"
            local fw_min="$2"
            local fw_max="$3"

            local repo="Transcode_for_x25"
            local arch="geminilakenk"

            local api_url="https://api.github.com/repos/007revad/${repo}/releases/latest"
            local release
            release=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
                           -H "Accept: application/vnd.github+json" \
                           "${api_url}")

            local tag version
            tag=$(echo "$release" | jq -r '.tag_name // empty')
            version="${tag#v}"

            # Read package metadata from the repo's package.json
            local pkg_json_url="https://raw.githubusercontent.com/007revad/${repo}/main/package.json"
            local pkg_json
            pkg_json=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "${pkg_json_url}")

            local pkg desc
            pkg=$(echo "$pkg_json"  | jq -r '.package')
            desc=$(echo "$pkg_json" | jq -r '.description // ""')
            local dname="${pkg} (DSM ${dsm_ver})"
            local thumbnail="https://007revad.github.io/spkrepo/thumbnails/${pkg}_120.png"

            # Match asset by DSM version and arch pattern
            local pattern="DSM-${dsm_ver}-${arch}\\.spk\$"
            local spk_url size
            spk_url=$(echo "$release" | jq -r \
              --arg pat "${pattern}" \
              '.assets[] | select(.name | test($pat; "i")) | .browser_download_url' \
              | head -1)

            if [[ -z "$spk_url" ]]; then
              echo "WARNING: No .spk asset matching DSM-${dsm_ver}-${arch} in ${repo} ${tag}" >&2
              spk_url="https://github.com/007revad/${repo}/releases/latest/download/Transcode_${tag}-DSM-${dsm_ver}-${arch}.spk"
            fi

            size=$(echo "$release" | jq -r \
              --arg pat "${pattern}" \
              '.assets[] | select(.name | test($pat; "i")) | .size' \
              | head -1)
            size="${size:-0}"

            if [[ -n "$fw_max" ]]; then
              jq -n \
                --arg package        "${pkg}" \
                --arg version        "${version}" \
                --arg dname          "${dname}" \
                --arg desc           "${desc}" \
                --arg maintainer     "007revad" \
                --arg maintainer_url "https://github.com/007revad" \
                --arg distributor    "007revad" \
                --arg dist_url       "https://github.com/007revad/${repo}" \
                --arg support_url    "https://github.com/007revad/${repo}/issues" \
                --arg report_url     "https://github.com/007revad/${repo}/issues" \
                --arg link           "${spk_url}" \
                --arg arch           "${arch}" \
                --arg firmware       "${fw_min}" \
                --arg os_max_ver     "${fw_max}" \
                --arg thumbnail      "${thumbnail}" \
                --argjson size       "${size}" \
                '{
                  package:          $package,
                  version:          $version,
                  dname:            $dname,
                  desc:             $desc,
                  maintainer:       $maintainer,
                  maintainer_url:   $maintainer_url,
                  distributor:      $distributor,
                  distributor_url:  $dist_url,
                  support_url:      $support_url,
                  report_url:       $report_url,
                  link:             $link,
                  arch:             $arch,
                  firmware:         $firmware,
                  os_max_ver:       $os_max_ver,
                  thumbnail:        [$thumbnail],
                  snapshot:         [],
                  beta:             false,
                  size:             $size
                }'
            else
              jq -n \
                --arg package        "${pkg}" \
                --arg version        "${version}" \
                --arg dname          "${dname}" \
                --arg desc           "${desc}" \
                --arg maintainer     "007revad" \
                --arg maintainer_url "https://github.com/007revad" \
                --arg distributor    "007revad" \
                --arg dist_url       "https://github.com/007revad/${repo}" \
                --arg support_url    "https://github.com/007revad/${repo}/issues" \
                --arg report_url     "https://github.com/007revad/${repo}/issues" \
                --arg link           "${spk_url}" \
                --arg arch           "${arch}" \
                --arg firmware       "${fw_min}" \
                --arg thumbnail      "${thumbnail}" \
                --argjson size       "${size}" \
                '{
                  package:          $package,
                  version:          $version,
                  dname:            $dname,
                  desc:             $desc,
                  maintainer:       $maintainer,
                  maintainer_url:   $maintainer_url,
                  distributor:      $distributor,
                  distributor_url:  $dist_url,
                  support_url:      $support_url,
                  report_url:       $report_url,
                  link:             $link,
                  arch:             $arch,
                  firmware:         $firmware,
                  thumbnail:        [$thumbnail],
                  snapshot:         [],
                  beta:             false,
                  size:             $size
                }'
            fi
          }

          # ------------------------------------------------------------------ #
          # Arch lists
          # ------------------------------------------------------------------ #
          INTEL_AMD="x86_64 apollolake avoton broadwellnk broadwellnkv2 broadwellntbap bromolow butalbital denverton epyc7002 geminilake grantley haswell kvmx64 purley r1000 v1000"
          ARM="armv8 rtd1296 rtd1619b aarch64 armada37xx armada38x"
          ARCH_OOKLA="${INTEL_AMD} ${ARM}"
          ARCH_NOARCH="${INTEL_AMD} ${ARM} alpine alpine4k"

          # ------------------------------------------------------------------ #
          # Build each package entry
          # (package ID, displayname, desc all read from each repo's package.json)
          # ------------------------------------------------------------------ #
          entry_ookla=$(make_entry  "Synology_Ookla_Speedtest"  "${ARCH_OOKLA}"  "7.0-0000")
          entry_open=$(make_entry   "Synology_Open_Speedtest"   "${ARCH_NOARCH}" "7.0-0000")
          entry_libre=$(make_entry  "Synology_Libre_Speedtest"  "${ARCH_NOARCH}" "7.0-0000")

          # DSM 7.2 build: capped at 7.2.x so DSM 7.3 users don't get offered it
          entry_transcode_72=$(make_transcode_entry "7.2" "7.2-0000" "7.2-99999")
          # DSM 7.3 build: no upper cap (latest DSM)
          entry_transcode_73=$(make_transcode_entry "7.3" "7.3-0000" "")

          # ------------------------------------------------------------------ #
          # Combine into final index.json
          # ------------------------------------------------------------------ #
          jq -n \
            --argjson e1 "${entry_ookla}" \
            --argjson e2 "${entry_open}" \
            --argjson e3 "${entry_libre}" \
            --argjson e4 "${entry_transcode_72}" \
            --argjson e5 "${entry_transcode_73}" \
            '{"packages": [$e1, $e2, $e3, $e4, $e5]}' \
            > spkrepo/index.json

          echo "Generated spkrepo/index.json:"
          cat spkrepo/index.json

      - name: Commit and push updated index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spkrepo/index.json
          if git diff --cached --quiet; then
            echo "No changes to index.json — skipping commit."
          else
            git commit -m "chore: update spkrepo index.json [skip ci]"
            git push
          fi
