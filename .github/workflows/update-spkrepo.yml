name: Update spkrepo index.json and thumbnails

# Triggers:
#   1. Called via repository_dispatch from each package repo (on new release)
#   2. Manual run from Actions tab
#   3. Weekly Sunday at 02:00 UTC (safety net catch-up)
on:
  repository_dispatch:
    types: [spk-release]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 007revad.github.io
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Install ImageMagick
        run: sudo apt-get install -y --no-install-recommends imagemagick

      - name: Fetch latest release info, regenerate index.json and update thumbnails
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p spkrepo/thumbnails

          # ------------------------------------------------------------------ #
          # Helper: sum download counts for all .spk assets across all releases.
          # Usage: get_total_downloads <user> <repo>
          # ------------------------------------------------------------------ #
          get_total_downloads() {
            local user="$1"
            local repo="$2"
            local total=0
            local page=1
            while true; do
              local page_data
              page_data=$(curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${user}/${repo}/releases?per_page=100&page=${page}")
              local page_count
              #page_count=$(echo "$page_data" | jq 'length')
              page_count=$(jq 'length' <<< "$page_data")
              if [[ "$page_count" -eq 0 ]]; then break; fi
              local page_total
              #page_total=$(echo "$page_data" | jq -r \
              #  '[.[].assets[] | select(.name | test("\\.spk$"; "i")) | .download_count] | add // 0')
              page_total=$(jq -r '[.[].assets[] | select(.name | test("\\.spk$"; "i")) |
                .download_count] | add // 0' <<< "$page_data" 2>/dev/null)                
              #total=$(( total + page_total ))
              total=$(( total + page_total )) || true
              if [[ "$page_count" -lt 100 ]]; then break; fi
              (( page++ ))
            done
            #echo "$total"
            printf '%s\n' "$total"
          }

          # ------------------------------------------------------------------ #
          # Helper: extract a named file from a remote SPK via streaming tar.
          # SPKs are uncompressed tars — INFO and PACKAGE_ICON_256.PNG are both
          # near the start so a 200 KB range request covers both comfortably.
          #
          # Usage: fetch_from_spk <spk_url> <filename>
          # Output: raw file contents printed to stdout
          # ------------------------------------------------------------------ #
          fetch_from_spk() {
            local url="$1"
            local filename="$2"
            #curl -fsSL --range 0-204799 "${url}" | tar -xOf - "${filename}" 2>/dev/null
            #curl -fsSL --range 0-524287 "${url}" | tar -xOf - "${filename}" 2>/dev/null
            curl -fsSL --globoff --range 0-524287 "${url}" | tar -xOf - "${filename}" 2>/dev/null
          }

          # ------------------------------------------------------------------ #
          # Helper: extract a single key from INFO content.
          # Strips surrounding single or double quotes.
          #
          # Usage: info_get <info_content> <key>
          # ------------------------------------------------------------------ #
          info_get() {
            local info="$1"
            local key="$2"
            echo "$info" | grep -m1 "^${key}=" | sed 's/^[^=]*=//;s/^["\x27]//;s/["\x27]$//'
          }

          # ------------------------------------------------------------------ #
          # Helper: return the version currently recorded in index.json for a
          # given package name. Returns empty string if not found.
          #
          # Usage: current_version <pkg>
          # ------------------------------------------------------------------ #
          current_version() {
            local pkg="$1"
            if [[ -f spkrepo/index.json ]]; then
              jq -r --arg p "$pkg" \
                '.packages[] | select(.package == $p) | .version' \
                spkrepo/index.json | head -1
            fi
          }

          # ------------------------------------------------------------------ #
          # Helper: update the thumbnail for a package from a SPK, but only
          # when the package version has changed since the last run.
          #
          # Extracts PACKAGE_ICON_256.PNG from the SPK, resizes to 120x120,
          # and writes spkrepo/thumbnails/<pkg>_120.png.
          #
          # Usage: maybe_update_thumbnail <spk_url> <pkg> <new_version>
          # ------------------------------------------------------------------ #
          maybe_update_thumbnail() {
            local spk_url="$1"
            local pkg="$2"
            local new_version="$3"

            local dest="spkrepo/thumbnails/${pkg}_120.png"
            local old_version
            old_version=$(current_version "${pkg}")

            # Skip if thumbnail already exists and version has not changed
            if [[ -f "${dest}" && "${old_version}" == "${new_version}" ]]; then
              echo "INFO: Thumbnail for ${pkg} is current (${new_version}) — skipping." >&2
              return
            fi

            echo "INFO: Updating thumbnail for ${pkg} (${old_version:-new} -> ${new_version})." >&2

            local tmp_icon
            tmp_icon=$(mktemp --suffix=.png)

            # Extract icon from SPK into temp file
            if ! fetch_from_spk "${spk_url}" "PACKAGE_ICON_256.PNG" > "${tmp_icon}" \
                || [[ ! -s "${tmp_icon}" ]]; then
              echo "WARNING: Could not extract PACKAGE_ICON_256.PNG from ${spk_url}" >&2
              rm -f "${tmp_icon}"
              return
            fi

            # Resize to 120x120, fitting within the canvas
            /usr/bin/convert "${tmp_icon}" \
              -resize 120x120 \
              -gravity center \
              -background none \
              -extent 120x120 \
              "${dest}"

            rm -f "${tmp_icon}"
            echo "INFO: Wrote ${dest}" >&2
          }

          # ------------------------------------------------------------------ #
          # Helper: fetch latest release SPKs for a repo and emit one
          # index.json entry per unique SPK (deduplicated by firmware range).
          #
          # If a noarch SPK exists it is preferred over arch-specific SPKs.
          # Any other arch with the same firmware range is skipped entirely.
          #
          # For repos with legitimate multiple SPKs (e.g. one per DSM version
          # with different os_min_ver/os_max_ver), each produces its own entry.
          #
          # Thumbnails are updated only when the package version has changed.
          #
          # Usage: make_entries <user> <repo>
          # Usage: make_entries <user> <repo> noreleases
          # ------------------------------------------------------------------ #
          make_entries() {
            local user="$1"
            local repo="$2"
            local noreleases="${3:-}"
            local tag version=""
            
            if [[ -z "$noreleases" ]]; then
                local release
                release=$(curl -fsSL \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${user}/${repo}/releases/latest")

                #tag=$(echo "$release" | jq -r '.tag_name // empty')
                tag=$(jq -r '.tag_name // empty' <<< "$release")
                version="${tag#v}"

                local download_count
                download_count=$(get_total_downloads "${user}" "${repo}")

                # Get all .spk asset URLs from the release, noarch first
                local all_spk_urls
                #mapfile -t all_spk_urls < <(echo "$release" | jq -r '
                #  [.assets[] | select(.name | test("\\.spk$"; "i"))] |
                #  sort_by(if (.name | test("noarch"; "i")) then 0 else 1 end) |
                #  .[].browser_download_url')
                mapfile -t all_spk_urls < <(jq -r '
                  [.assets[] | select(.name | test("\\.spk$"; "i"))] |
                  sort_by(if (.name | test("noarch"; "i")) then 0 else 1 end) |
                  .[].browser_download_url' <<< "$release")

                if [[ ${#all_spk_urls[@]} -eq 0 ]]; then
                  echo "WARNING: No .spk assets found in ${user}/${repo} ${tag}" >&2
                  return
                fi
            else
                # No releases — find .spk files directly in the repo file tree.
                # download_count will be 0 (no releases = no release download stats).
                local download_count=0

                local all_spk_urls
                mapfile -t all_spk_urls < <(curl -fsSL \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${user}/${repo}/git/trees/HEAD?recursive=1" \
                  | jq -r '
                    [.tree[] | select(.type == "blob" and (.path | test("\\.spk$"; "i")))] |
                    sort_by(if (.path | test("noarch"; "i")) then 0 else 1 end) |
                    .[].path' \
                  | grep -v '\[' \
                  | sed 's| |%20|g; s|^|https://raw.githubusercontent.com/'"${user}"'/'"${repo}"'/HEAD/|')

                if [[ ${#all_spk_urls[@]} -eq 0 ]]; then
                  echo "WARNING: No .spk files found in ${user}/${repo} file tree" >&2
                  return
                fi
            fi

            # Track which firmware ranges have already been emitted.
            # Key is os_min_ver|os_max_ver — once a noarch SPK claims a range,
            # all arch-specific SPKs for that same range are skipped.
            declare -A seen_keys

            # Track which package names have had their thumbnail processed this
            # run, so multi-SPK repos (e.g. Transcode DSM 7.2 + 7.3) only
            # attempt the thumbnail once per package name.
            declare -A thumbnail_done

            local spk_url
            for spk_url in "${all_spk_urls[@]}"; do
              #version=""  # Reset for each SPK in noreleases repos
              local info
              info=$(fetch_from_spk "${spk_url}" "INFO")

              if [[ -z "$info" ]]; then
                echo "WARNING: Could not extract INFO from ${spk_url}" >&2
                continue
              fi

              # Read core fields from INFO
              local pkg arch os_min_ver os_max_ver
              pkg=$(        info_get "$info" "package")
              arch=$(       info_get "$info" "arch")
              os_min_ver=$( info_get "$info" "os_min_ver")
              os_max_ver=$( info_get "$info" "os_max_ver")
              # For noreleases repos, version comes from INFO rather than a release tag
              # Skip packages older than DSM 6
              local min_ver="${os_min_ver:-$(info_get "$info" "firmware")}"
              if [[ -n "$min_ver" && "${min_ver%%.*}" -lt 6 ]]; then
                echo "INFO: Skipping $(basename "${spk_url}") (os_min_ver=${min_ver} < 6)" >&2
                continue
              fi
              #[[ -z "$version" ]] && version=$(info_get "$info" "version")
              [[ -n "$noreleases" ]] && version=$(info_get "$info" "version")

              # Deduplicate by firmware range only (os_min_ver + os_max_ver).
              # Because SPKs are sorted noarch-first, the first SPK seen for a
              # given firmware range is always the noarch one (if it exists).
              #local dedup_key="${os_min_ver}|${os_max_ver}"
              local dedup_key="${pkg}|${version}|${os_min_ver}|${os_max_ver}"
              if [[ -n "${seen_keys[$dedup_key]+x}" ]]; then
                echo "INFO: Skipping ${arch} SPK (firmware range ${os_min_ver}..${os_max_ver} already covered by noarch): $(basename "${spk_url}")" >&2
                continue
              fi
              seen_keys[$dedup_key]=1

              # Update thumbnail once per package name, only if version changed
              if [[ -z "${thumbnail_done[$pkg]+x}" ]]; then
                maybe_update_thumbnail "${spk_url}" "${pkg}" "${version}"
                thumbnail_done[$pkg]=1
              fi

              # Read remaining metadata from INFO — all fields verbatim, no substitution
              local dname desc maintainer maintainer_url distributor distributor_url support_url
              dname=$(           info_get "$info" "displayname")
              [[ -z "$dname" ]]  && dname="$pkg"
              desc=$(            info_get "$info" "description")
              maintainer=$(      info_get "$info" "maintainer")
              maintainer_url=$(  info_get "$info" "maintainer_url")
              distributor=$(     info_get "$info" "distributor")
              distributor_url=$( info_get "$info" "distributor_url")
              support_url=$(     info_get "$info" "support_url")

              # Collect localised displayname_<lang> fields from INFO
              local dname_langs
              dname_langs=$(echo "$info" | grep -E '^displayname_[a-z]+=' | \
                sed 's/^displayname_\([a-z]*\)=\(.*\)$/\1 \2/' | \
                while IFS=' ' read -r lang val; do
                  val="${val#\"}" ; val="${val%\"}"
                  val="${val#\'}" ; val="${val%\'}"
                  printf '"%s":"%s"\n' "dname_${lang}" "$val"
                done | paste -sd ',' | sed 's/^/{/;s/$/}/')
              [[ -z "$dname_langs" || "$dname_langs" == "{}" ]] && dname_langs="{}"

              # Collect localised description_<lang> fields from INFO
              local desc_langs
              desc_langs=$(echo "$info" | grep -E '^description_[a-z]+=' | \
                sed 's/^description_\([a-z]*\)=\(.*\)$/\1 \2/' | \
                while IFS=' ' read -r lang val; do
                  val="${val#\"}" ; val="${val%\"}"
                  val="${val#\'}" ; val="${val%\'}"
                  printf '"%s":"%s"\n' "desc_${lang}" "$val"
                done | paste -sd ',' | sed 's/^/{/;s/$/}/')
              [[ -z "$desc_langs" || "$desc_langs" == "{}" ]] && desc_langs="{}"

              # Firmware: use os_min_ver as-is; fall back to a safe default
              local firmware="${os_min_ver}"
              [[ -z "$firmware" ]] && firmware="7.0-0000"

              # os_max_ver: treat "9.9-99999" or absent as no upper bound
              local max_ver_json="null"
              if [[ -n "$os_max_ver" && "$os_max_ver" != "9.9-99999" ]]; then
                max_ver_json="\"${os_max_ver}\""
              fi

              local size=0
              if [[ -z "$noreleases" ]]; then
                #size=$(echo "$release" | jq -r \
                #  --arg url "${spk_url}" \
                #  '.assets[] | select(.browser_download_url == $url) | .size' \
                #  | head -1)
                size=$(jq -r --arg url "${spk_url}" \
                  '.assets[] | select(.browser_download_url == $url) | .size' \
                  <<< "$release" | head -1)
                size="${size:-0}"
              fi

              local thumbnail="https://007revad.github.io/spkrepo/thumbnails/${pkg}_120.png"

              jq -n \
                --arg package              "${pkg}" \
                --arg version              "${version}" \
                --arg dname                "${dname}" \
                --argjson dname_langs      "${dname_langs}" \
                --arg desc                 "${desc}" \
                --argjson desc_langs       "${desc_langs}" \
                --arg maintainer           "${maintainer}" \
                --arg maintainer_url       "${maintainer_url}" \
                --arg distributor          "${distributor}" \
                --arg dist_url             "${distributor_url}" \
                --arg support_url          "${support_url}" \
                --arg report_url           "${support_url}" \
                --arg link                 "${spk_url}" \
                --arg arch                 "${arch}" \
                --arg firmware             "${firmware}" \
                --argjson os_max_ver       "${max_ver_json}" \
                --arg thumbnail            "${thumbnail}" \
                --argjson size             "${size}" \
                --argjson download_count   "${download_count}" \
                '{
                  package:               $package,
                  version:               $version,
                  dname:                 $dname,
                  desc:                  $desc,
                  maintainer:            $maintainer,
                  maintainer_url:        $maintainer_url,
                  distributor:           $distributor,
                  distributor_url:       $dist_url,
                  support_url:           $support_url,
                  report_url:            $report_url,
                  link:                  $link,
                  arch:                  $arch,
                  firmware:              $firmware,
                  os_max_ver:            $os_max_ver,
                  thumbnail:             [$thumbnail],
                  snapshot:              [],
                  beta:                  false,
                  size:                  $size,
                  download_count:        $download_count,
                  recent_download_count: $download_count
                } + $dname_langs + $desc_langs'
            done
          }

          # ------------------------------------------------------------------ #
          # Build each package entry.
          # To add a new package, append one make_entries line here.
          # ------------------------------------------------------------------ #
          entries=()

          # 007revad repos
          entries+=( "$(make_entries "007revad" "Synology_Ookla_Speedtest")" )
          entries+=( "$(make_entries "007revad" "Synology_Open_Speedtest")" )
          entries+=( "$(make_entries "007revad" "Synology_Libre_Speedtest")" )
          entries+=( "$(make_entries "007revad" "Transcode_for_x25")" )

          # Friends' repos
          entries+=( "$(make_entries "PeterSuh-Q3" "SynoSmartInfo")" )
          entries+=( "$(make_entries "toafez"      "AutoPilot")" )
          entries+=( "$(make_entries "toafez"      "LogAnalysis")" )
          entries+=( "$(make_entries "schmidhorst" "synology-autorun")" )

          # repos with spk files in repo file tree
          entries+=( "$(make_entries "BenjV" "SYNO-packages" "noreleases")" )

          # ------------------------------------------------------------------ #
          # Combine into final index.json
          # ------------------------------------------------------------------ #
          printf '%s\n' "${entries[@]}" | jq -s '{"packages": .}' > spkrepo/index.json

          echo "Generated spkrepo/index.json:"
          cat spkrepo/index.json

      - name: Commit and push index.json and any updated thumbnails
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spkrepo/index.json spkrepo/thumbnails/
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: update spkrepo index.json and thumbnails [skip ci]"
            git push
          fi
