name: Update spkrepo index.json and thumbnails

# Change spkrepo to spkrepo_test or vice versa 
env:
  REPO_DIR: spkrepo

# Triggers:
#   1. Called via repository_dispatch from each package repo (on new release)
#   2. Manual run from Actions tab
#   3. Weekly daily at 02:00 UTC (safety net catch-up)
on:
  repository_dispatch:
    types: [spk-release]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 007revad.github.io
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Install ImageMagick
        run: sudo apt-get install -y --no-install-recommends imagemagick

      - name: Fetch latest release info, regenerate index.json and update thumbnails
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISPATCH_REPO: ${{ github.event.client_payload.repo }}
        run: bash .github/scripts/update-spkrepo.sh

      - name: Commit and push index.json and any updated thumbnails
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.REPO_DIR }}/index.json ${{ env.REPO_DIR }}/thumbnails/
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore: update spkrepo index.json and thumbnails [skip ci]"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected, pulling and retrying (${i})..."
            git pull --rebase origin main
            sleep $(( RANDOM % 5 + 1 ))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1
